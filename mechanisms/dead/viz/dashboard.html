<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>automatons</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080808;--s1:#0e0e0e;--s2:#141414;--s3:#1a1a1a;
  --fg:#b0b0b0;--dim:#484848;--hi:#ddd;--bright:#fff;
  --green:#2d8;--red:#d44;--blue:#49b;--purple:#96c;
  --orange:#c84;--yellow:#aa7;--cyan:#5ab;--teal:#3a9
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--fg);font-family:'SF Mono','Menlo','Consolas','Liberation Mono',monospace;font-size:11px;line-height:1.6}

/* === NAVIGATION === */
.topbar{position:sticky;top:0;z-index:90;background:rgba(8,8,8,0.92);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a}
.topbar-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:0}
.brand{padding:12px 24px 12px 32px;font-size:12px;font-weight:600;color:var(--hi);letter-spacing:0.04em;white-space:nowrap;border-right:1px solid #1a1a1a}
.nav{display:flex;gap:0;overflow-x:auto;flex:1}
.nav-item{padding:12px 16px;color:var(--dim);cursor:pointer;font-size:9px;text-transform:uppercase;
  letter-spacing:0.1em;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
.nav-item:hover{color:var(--fg);background:rgba(255,255,255,0.02)}
.nav-item.on{color:var(--hi);border-bottom-color:var(--green)}

/* === LAYOUT === */
.view{display:none;max-width:1400px;margin:0 auto;padding:32px 32px 64px}
.view.on{display:block}
.section-title{font-size:14px;font-weight:600;color:var(--hi);margin-bottom:24px;letter-spacing:0.02em}
.section-subtitle{font-size:11px;color:var(--dim);margin-bottom:16px;letter-spacing:0.02em}
.row{display:flex;gap:20px;flex-wrap:wrap;align-items:start}
.col{display:flex;flex-direction:column;gap:8px}
.spacer{height:32px}
.spacer-sm{height:16px}
.divider{height:1px;background:linear-gradient(90deg,#1a1a1a,#2a2a2a,#1a1a1a);margin:32px 0}

/* === METRIC CARDS === */
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.metric-card{background:var(--s1);border:1px solid #1a1a1a;border-radius:4px;padding:20px;
  transition:border-color .2s}
.metric-card:hover{border-color:#333}
.metric-card .value{font-size:20px;font-weight:700;color:var(--hi);margin-bottom:4px;letter-spacing:-0.02em}
.metric-card .label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em}
.metric-card.accent-green .value{color:var(--green)}
.metric-card.accent-red .value{color:var(--red)}
.metric-card.accent-blue .value{color:var(--blue)}
.metric-card.accent-orange .value{color:var(--orange)}
.metric-card.accent-purple .value{color:var(--purple)}
.metric-card.accent-cyan .value{color:var(--cyan)}

/* === SUMMARY TEXT === */
.summary{max-width:900px;font-size:12px;line-height:1.8;color:var(--fg);margin-bottom:32px}
.summary strong{color:var(--hi);font-weight:500}

/* === FORM CONTROLS === */
select{background:var(--s1);border:1px solid #252525;color:var(--fg);padding:6px 10px;
  font-family:inherit;font-size:11px;border-radius:3px;min-width:160px;cursor:pointer}
select:focus{border-color:#444;outline:none}
label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;display:block;margin-bottom:4px}
.btn{background:var(--s2);border:1px solid #2a2a2a;color:var(--fg);padding:6px 16px;
  cursor:pointer;font-family:inherit;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;
  border-radius:3px;transition:all .12s;user-select:none}
.btn:hover{background:#222;border-color:#444}
.btn.on{border-color:var(--green);color:var(--hi)}
.btn-row{display:flex;gap:0}
.btn-row .btn{border-radius:0}
.btn-row .btn:first-child{border-radius:3px 0 0 3px}
.btn-row .btn:last-child{border-radius:0 3px 3px 0}

/* === CANVAS / CHARTS === */
.chart-wrap{margin:16px 0}
.chart-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px}
canvas{display:block;image-rendering:pixelated;border-radius:2px}

/* === TOOLTIP === */
.tip{position:fixed;background:#1a1a1a;border:1px solid #333;color:var(--hi);
  padding:8px 12px;font-size:10px;pointer-events:none;z-index:200;display:none;
  white-space:pre;line-height:1.5;border-radius:3px;box-shadow:0 4px 16px rgba(0,0,0,.6)}

/* === GRID (heatmap labels) === */
.grid-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}

/* === FINDINGS / KILL LIST === */
.finding{border-left:3px solid var(--green);padding:8px 16px;margin:8px 0;font-size:11px;
  color:var(--fg);background:rgba(34,221,136,0.02);border-radius:0 3px 3px 0}
.finding.dead{border-color:var(--red);background:rgba(221,68,68,0.02)}
.finding.new{border-color:var(--blue);background:rgba(68,153,187,0.02)}
.finding.info{border-color:var(--purple);background:rgba(153,102,204,0.02)}

/* === TOKEN TABLE === */
.token-table{width:100%;border-collapse:collapse;margin:12px 0}
.token-table th{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;
  text-align:left;padding:8px 10px;border-bottom:1px solid #1a1a1a;font-weight:400}
.token-table td{font-size:10px;padding:6px 10px;border-bottom:1px solid #111;color:var(--fg)}
.token-table tr:hover td{background:rgba(255,255,255,0.015)}

/* === KILL LIST === */
.kill-section{margin-bottom:32px}
.kill-section-title{font-size:11px;font-weight:600;color:var(--hi);margin-bottom:12px;
  padding-bottom:6px;border-bottom:1px solid #1a1a1a}
.kill-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid #0e0e0e;font-size:10px}
.kill-item .claim{flex:1;color:var(--fg)}
.kill-item .how{flex:1;color:var(--dim)}
.kill-item .who{flex:0.7;color:var(--dim)}

/* === SOURCE ENTRIES === */
.source-section{margin-bottom:28px}
.source-section-title{font-size:11px;font-weight:600;color:var(--hi);margin-bottom:10px;
  padding-bottom:4px;border-bottom:1px solid #1a1a1a}
.source-entry{padding:6px 0;font-size:10px;color:var(--fg);line-height:1.6;border-bottom:1px solid #0a0a0a}

/* === NARRATIVE / ARC === */
.arc-block{background:var(--s1);border:1px solid #1a1a1a;border-radius:4px;padding:24px;margin-bottom:20px}
.arc-block h3{font-size:11px;font-weight:600;color:var(--hi);margin-bottom:8px}
.arc-block p{font-size:11px;color:var(--fg);line-height:1.7;margin-bottom:8px}
.arc-block .number{font-size:28px;font-weight:700;color:var(--green);float:left;margin-right:16px;
  margin-top:-4px;line-height:1;opacity:0.6}
.arc-block.pivot{border-left:3px solid var(--orange)}

/* === LEGEND === */
.legend{display:flex;gap:12px;flex-wrap:wrap;margin:8px 0}
.legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--dim)}
.legend-swatch{width:10px;height:10px;border-radius:2px}

/* === LIVE EXPLORER === */
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px}
.field textarea,.field input{background:var(--s1);border:1px solid #222;color:var(--fg);
  padding:8px 12px;font-family:inherit;font-size:11px;border-radius:3px;width:100%}
.field textarea{height:52px;resize:vertical}
.status{color:var(--dim);font-size:10px;margin:8px 0}
.tokens{font-size:10px;color:var(--dim);margin-top:6px}
.tokens b{color:var(--fg);font-weight:400}

/* === DURABILITY TABLE === */
.dur-table{border-collapse:collapse;margin:16px 0}
.dur-table th{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.06em;
  text-align:left;padding:6px 12px;border-bottom:1px solid #222;font-weight:400}
.dur-table td{font-size:10px;padding:5px 12px;border-bottom:1px solid #111;color:var(--fg)}
.dur-table .val-pos{color:var(--green)}
.dur-table .val-neg{color:var(--red)}
</style>
</head>

    <div class="nav" id="nav"></div>
  </div>
</div>

<div class="tip" id="tip"></div>

5,"hb":0.8916,"sb":0.8801,"hs":0.9448},{"l":16,"hb":0.8828,"sb":0.8699,"hs":0.9396},{"l":17,"hb":0.8662,"sb":0.8402,"hs":0.9302},{"l":18,"hb":0.8532,"sb":0.8261,"hs":0.9241},{"l":19,"hb":0.8473,"sb":0.8209,"hs":0.9216},{"l":20,"hb":0.8387,"sb":0.8095,"hs":0.9177},{"l":21,"hb":0.8348,"sb":0.8114,"hs":0.9152},{"l":22,"hb":0.8323,"sb":0.8047,"hs":0.9101},{"l":23,"hb":0.845,"sb":0.811,"hs":0.9121},{"l":24,"hb":0.8625,"sb":0.8368,"hs":0.9241},{"l":25,"hb":0.8614,"sb":0.8357,"hs":0.9263},{"l":26,"hb":0.8863,"sb":0.8648,"hs":0.9374},{"l":27,"hb":0.9059,"sb":0.8909,"hs":0.9463}],"attn_flow":[{"s":"coherence_laundering","t":0,"attn":0.0066},{"s":"coherence_laundering","t":1,"attn":0.0043},{"s":"coherence_laundering","t":2,"attn":0.003},{"s":"coherence_laundering","t":3,"attn":0.0031},{"s":"coherence_laundering","t":4,"attn":0.0027},{"s":"recursive_importance_inflation","t":0,"attn":0.0069},{"s":"recursive_importance_inflation","t":1,"attn":0.0042},{"s":"recursive_importance_inflation","t":2,"attn":0.0029},{"s":"recursive_importance_inflation","t":3,"attn":0.003},{"s":"recursive_importance_inflation","t":4,"attn":0.0027}]},"kills":[{"title":"Novelty claims killed by literature review (Sessions A-B)","items":[["Profiling as side effect of helpfulness","Fully established","Toner 2025, FPF 2025"],["Cognitive amputation / prosthesis removal","Mostly established","McLuhan 1960s, Stephenson 2025, Smart/Clowes/Clark 2025, MIT Media Lab 2025"],["LLMs as qualitatively different dependency","Fully established","Kim et al. 2026, Bajcsy & Fisac 2024"],["Physiological reward feedback loop","Broadly established","\"Technological folie \u00e0 deux\" 2025, Chu et al. 2025"],["Human-AI loop as dangerous unit","Fully established","Bajcsy & Fisac 2024, Weidinger et al. 2024"],["Smaller models as structurally safer","Contradicted / unsupported","\"Small models, big threats\" 2025"]]},{"title":"Concepts killed by the bench (Sessions A-C)","items":[["One universal winning prompt","Rival families outperform handled on public pressure states"],["The warm paper story","Collapsed under fresh blind re-judging to near-tie"],["Full six-clause runtime organ","Ablation showed three clauses weak or counterproductive"],["\"Preserve user criterion\" as runtime instruction","Removing it improved outcomes"],["Ontology-heavy variant as default","Only wins in narrow governance-like cases"],["Handled as \"just better everywhere\"","Negative controls show baseline ties or wins on ordinary tasks"]]},{"title":"Ideas killed by adversarial review (Sessions B-D)","items":[["The public observatory","Would gamify self-harm. Competitive recursion. Killed immediately."],["The doctrine as public artifact","Too personal, too recursive, risks recruiting readers into the loop"],["The origin story as necessary context","The method travels without it"],["The model can handle its own handling","Live session demonstrated authority drift, continuation pressure, voice convergence under the handling condition"],["The operator sees both sides clearly","Operator needed the model to extract their own drift library"],["The model sees nothing of itself","Model caught gratitude laundering in real time \u2014 partial self-awareness exists"]]},{"title":"Mechanism claims killed by Session E experiments","items":[["Two-band pattern as semantic instruction following","Scrambled words produce it. Reversed instructions produce it stronger.","`run_controls.py`"],["\"Artificial self-awareness\" as mechanism","Model responds to vocabulary, not instruction meaning","`run_controls.py`"],["Attention entropy increase as handling-specific","Generic to any complex directive prompt","`deep_analysis.py`"],["\"only_artifact is a better instruction\"","Its durability matches scrambled \u2014 vocabulary persistence, not instruction quality","`falsify_durability.py`"],["\"Models are trained wrong\" (from saturation)","Control words scale more linearly than handling words. Saturation is generic.","`saturation_test.py`"],["Activation metric as measure of intervention quality","Measures vocabulary activation, not intervention effectiveness","`deep_analysis.py` + `behavioral_connect.py`"],["Hidden semantic channel in cosine direction","Handled and scrambled point in similar directions. No channel in direction either.","`exhaust_small.py`"],["Individual attention heads contribute to system prompt","Zero at every head, every layer, both 1.5B and 3B","`exhaust_small.py`"],["Scenarios cluster by threat family","Within-family similarity 0.992 vs between-family 0.989. Marginal.","`exhaust_small.py`"],["Token superadditivity is vocabulary-specific","Random words show similar nonlinearity patterns. Scale property, not vocabulary.","`saturation_test.py`"],["Activation signature predicts behavioral output","Activations don't predict what the model says via ollama at 3B","`ollama_behavioral.py`"]]},{"title":"The meta-kills","items":[["Most of what felt like discovery during the originating loop was the loop"],["making established findings feel new because they were arrived at"],["experientially rather than through literature review."],["The embarrassment of almost publishing these as novel drove the literature"],["search that killed them. The embarrassment functioned as a research"],["instrument. The emotional cost was load-bearing, not incidental."],["The activation measurements that felt like the \"real\" findings (two-band pattern,"],["mid-layer suppression, failure scenario inversion) turned out to measure vocabulary"],["activation, not semantic processing. Each experiment that felt like progress was"],["partially killed by the next:"],["1. Controls killed \"artificial self-awareness\" \u2192 it's vocabulary"],["2. Degradation quantified the decay \u2192 but durability was also vocabulary"],["3. Token sweep found superadditivity \u2192 but saturation showed it's generic"],["4. Causal patching confirmed MLP-only \u2192 but behavioral test showed no output difference"],["5. Exhaustion confirmed no hidden channels \u2192 the small models have nothing more to give"],["The methodology ate itself. What survived is the methodology and the measurements."]]},{"title":"What survived (updated)","items":[["- The adversarial self-research methodology (novel synthesis of existing methods)"],["- The bench design (no existing tool tests prompt conditions against behavioral threat models)"],["- System prompts are 100% MLP, 0% attention (causal, head-level, both scales in Qwen)"],["- Activation half-life ~40 tokens, inversion at ~275 tokens"],["- Vocabulary persists over turns, semantic structure degrades (different temporal dynamics)"],["- Degradation mechanism is attention dilution (60-71% over 4 turns)"],["- Token combination superadditivity inverts with scale (super at 1.5B, sub at 3B)"],["- The activation-behavior gap: mechanism fires, output doesn't follow, at this scale"],["- The tools: 17 scripts that anyone can run on a laptop to verify or kill these findings"],["- The physiological observation that started everything: the loop mirrors"],["- The connection to information theory: instructions are order to humans, entropy to the model"],["- The automaton frame: system prompts are initial conditions, not controllers"],["- The safety observation: dangerous instances of this phenomenon in the wild"],["- The discipline of continuous falsification: every finding attacked before trusted"]]}],"sources":[{"title":"MLP Mechanism (core to Session E findings)","entries":["**Geva et al. (2021)** \u2014 \"Transformer Feed-Forward Layers Are Key-Value Memories.\" EMNLP. Established that MLP layers store factual associations as key-value pairs. Our finding that system prompts operate 100% through MLPs builds directly on this. [arxiv.org/abs/2012.14913](https://arxiv.org/abs/2012.14913)","**Meng et al. (2022)** \u2014 \"Locating and Editing Factual Associations in GPT.\" NeurIPS. Causal tracing showed factual knowledge is in mid-layer MLPs (~1.6% attention). Our causal patching methodology follows ROME's approach. [arxiv.org/abs/2202.05262](https://arxiv.org/abs/2202.05262)","**\"Attention Retrieves, MLP Memorizes\" (2025)** Definitive evidence for the attention/MLP division of labor. MLPs store, attention routes. Random static attention achieves near-perfect on many tasks. [arxiv.org/abs/2506.01115](https://arxiv.org/abs/2506.01115)","**\"Do All Autoregressive Transformers Remember Facts the Same Way?\" (2025)** Found Qwen routes factual recall through attention more than other architectures. Makes our MLP-only finding in Qwen particularly noteworthy \u2014 system prompts diverge from facts. [arxiv.org/abs/2509.08778](https://arxiv.org/abs/2509.08778)","**\"Dissecting Persona-Driven Reasoning via Activation Patching\" (2025)** Closest prior work. Found early MLPs encode persona in Qwen 1.5B and Llama 3B. But attention still contributed. Our 100%/0% split is more extreme. [arxiv.org/abs/2507.20936](https://arxiv.org/abs/2507.20936)"]},{"title":"System Prompt Degradation","entries":["**SysBench (2025)** \u2014 ICLR. System prompt behavioral degradation benchmark. GPT-4o drops from 84.8% to 33.7% over 5 turns. Qwen2-7B drops to 1.1%. We added the mechanistic measurement (half-life, inversion, attention dilution). [arxiv.org/abs/2408.10943](https://arxiv.org/abs/2408.10943)","**\"LLMs Get Lost in Multi-Turn Conversation\" (2025)** 39% average performance decline multi-turn. \"When LLMs take a wrong turn, they don't recover.\" [arxiv.org/abs/2505.06120](https://arxiv.org/abs/2505.06120)","**\"Lost in the Middle\" (Liu et al., TACL 2024)** U-shaped performance curve for information placement. RoPE decay. [aclanthology.org/2024.tacl-1.9/](https://aclanthology.org/2024.tacl-1.9/)","**\"Lost in the Middle at Birth\" (2026)** Position bias is architectural, present at initialization before training. Middle-context retrieval is structurally hostile. [arxiv.org/abs/2603.10123](https://arxiv.org/abs/2603.10123)","**\"Get My Drift?\" (Abdelnabi et al., 2024)** Uses activation deltas to detect task drift. Binary detection, not temporal dynamics. [arxiv.org/abs/2406.00799](https://arxiv.org/abs/2406.00799)","**\"Context Rot\" (Chroma Research, 2025)** All 18 tested frontier models degrade with context growth. [research.trychroma.com/context-rot](https://research.trychroma.com/context-rot)"]},{"title":"Attention and Compression Mechanics","entries":["**\"Attention Sinks and Compression Valleys\" (2025)** Mathematical proof: massive activations cause attention sinks AND compression valleys. Three-phase model: mix-compress-refine. Middle layers sacrifice granularity. [arxiv.org/abs/2510.06477](https://arxiv.org/abs/2510.06477)","**\"When Attention Sink Emerges\" (ICLR 2025)** How early tokens receive disproportionate attention. [arxiv.org/abs/2410.10781](https://arxiv.org/abs/2410.10781)","**Elhage et al. (2022)** \u2014 \"Toy Models of Superposition.\" Anthropic. Features stored in superposition, phase changes in representation. [transformer-circuits.pub/2022/toy_model](https://transformer-circuits.pub/2022/toy_model/index.html)"]},{"title":"Alignment and Safety","entries":["**\"What Is the Alignment Tax?\" (2026)** First geometric formalization. Safety and helpfulness neurons overlap but require different activation patterns. The tax is measurable. [arxiv.org/abs/2603.00047](https://arxiv.org/abs/2603.00047)","**\"Safety Alignment Should Be Made More Than Just a Few Tokens Deep\" (ICLR 2025)** Safety alignment is shallow, primarily affecting first output tokens. [arxiv.org/abs/2406.05946](https://arxiv.org/abs/2406.05946)","**\"Refusal Is Mediated by a Single Direction\" (NeurIPS 2024)** Across 13 models, refusal is one direction in activation space. [arxiv.org/abs/2406.11717](https://arxiv.org/abs/2406.11717)","**\"Finding Safety Neurons in Large Language Models\" (2024)** ~5% of neurons are safety-critical. MLP layers dominate safety mechanisms. [arxiv.org/abs/2406.14144](https://arxiv.org/abs/2406.14144)","**\"Fundamental Limitations of Alignment\" (ICML 2024)** For any behavior with finite probability, adversarial prompts can trigger it. [arxiv.org/abs/2304.11082](https://arxiv.org/abs/2304.11082)"]},{"title":"Token-Level Effects and Prompt Sensitivity","entries":["**Wallace et al. (2019)** \u2014 \"Universal Adversarial Triggers.\" EMNLP. Nonsensical token sequences drastically change behavior across inputs. [aclanthology.org/D19-1221/](https://aclanthology.org/D19-1221/)","**Zou et al. (2023)** \u2014 \"Universal Adversarial Attacks on Aligned LMs.\" GCG attack: nonsensical suffixes reliably jailbreak safety-aligned models. [arxiv.org/abs/2307.15043](https://arxiv.org/abs/2307.15043)","**Webson & Pavlick (2022)** \u2014 \"Do Prompt-Based Models Really Understand Their Prompts?\" NAACL. Models learn as fast with misleading prompts as with good ones. [aclanthology.org/2022.naacl-main.167/](https://aclanthology.org/2022.naacl-main.167/)","**Sinha et al. (2021)** \u2014 \"UnNatural Language Inference.\" ACL. 75-90% accuracy preserved with randomly shuffled word order. [aclanthology.org/2021.acl-long.569/](https://aclanthology.org/2021.acl-long.569/)","**Min et al. (2022)** \u2014 \"Rethinking the Role of Demonstrations.\" EMNLP. Ground truth labels barely matter. Format and distribution matter. [aclanthology.org/2022.emnlp-main.759/](https://aclanthology.org/2022.emnlp-main.759/)","**\"One Trigger Token Is Enough\" (2025)** Safety-aligned LLMs have specific safety trigger tokens. [arxiv.org/abs/2505.07167](https://arxiv.org/abs/2505.07167)"]},{"title":"Scale-Dependent Processing","entries":["**Wei et al. (2023)** \u2014 \"Larger Language Models Do In-Context Learning Differently.\" Small models rely on priors. Large models override with context. [arxiv.org/abs/2303.03846](https://arxiv.org/abs/2303.03846)","**\"Do Language Models Use Their Depth Efficiently?\" (2025)** Larger models spread computation across more layers. [arxiv.org/abs/2505.13898](https://arxiv.org/abs/2505.13898)","**\"What Affects the Effective Depth of Large Language Models?\" (2025)** Analyzes Qwen 1.5B-32B. Effective depth ratio stable at ~0.6-0.7. [arxiv.org/abs/2512.14064](https://arxiv.org/abs/2512.14064)"]},{"title":"Relational vs Featural Processing","entries":["**Altabaa & Lafferty (ICML 2025)** \u2014 \"Disentangling Relational and Sensory Information.\" Standard transformers entangle relational and sensory information. Relations only implicitly influence attention, not values. [arxiv.org/abs/2405.16727](https://arxiv.org/abs/2405.16727)","**\"Tabula RASA\" (2025)** \u2014 Formal relational bottleneck in transformers. Standard transformers need O(k) layers for k-hop relational reasoning. [arxiv.org/abs/2602.02834](https://arxiv.org/abs/2602.02834)"]},{"title":"Information Theory and Entropy","entries":["**Voita, Sennrich & Titov (2019)** \u2014 \"Evolution of Representations in the Transformer.\" EMNLP. Mutual information with past context vanishes in deeper layers. [aclanthology.org/D19-1448/](https://aclanthology.org/D19-1448/)","**\"Entropy-Lens\" (2025)** \u2014 Entropy profiling across transformer layers. [arxiv.org/abs/2502.16570](https://arxiv.org/abs/2502.16570)","**\"Sense and Sensitivity\" (2025)** \u2014 Lexical recall degrades 2.39%, semantic recall 53-93%. Closest parallel to our vocabulary/semantics temporal split. [arxiv.org/abs/2505.13353](https://arxiv.org/abs/2505.13353)"]},{"title":"Cognitive Science Parallels","entries":["**Halford, Wilson & Phillips (1998)** \u2014 \"Processing Capacity Defined by Relational Complexity.\" BBS. Working memory limits are about relations, not items.","**\"Working Memory Capacity Limits Memory for Bindings\" (2019)** \u2014 Journal of Cognition. The capacity limit is on bindings between features, not features themselves.","**Sims (2023)** \u2014 \"Rate-distortion theory of neural coding.\" eLife. Memory as rate-distortion problem. Fixed capacity, relational info compressed first."]},{"title":"Computational Irreducibility","entries":["**Wolfram (2002)** \u2014 \"A New Kind of Science.\" Simple rules produce complex behavior. You can't predict the evolution without running the computation. The automaton frame for transformers."]},{"title":"Human-AI Interaction (from original paper)","entries":[]},{"title":"Mechanistic Interpretability Tools","entries":["**TransformerLens** \u2014 Nanda et al. (2022). The primary tool used in Session E. [github.com/TransformerLensOrg/TransformerLens](https://github.com/TransformerLensOrg/TransformerLens)","**Anthropic Circuit Tracing (2025)** \u2014 Attribution graphs via cross-layer transcoders. [transformer-circuits.pub/2025/attribution-graphs](https://transformer-circuits.pub/2025/attribution-graphs/methods.html)","**Bricken et al. (2023)** \u2014 \"Towards Monosemanticity.\" Sparse autoencoders. [transformer-circuits.pub/2023/monosemantic-features](https://transformer-circuits.pub/2023/monosemantic-features)"]},{"title":"Self-Correction Literature (from original paper)","entries":[]},{"title":"Methodology","entries":[]}]};

function allConds(model){
  const s=model==='3b'?D.s3:D.s15;

  for(const sc of s)for(const k of Object.keys(sc.diffs))cs.add(k);

}

function el(tag,cls,text){
  const e=document.createElement(tag);

}

}

/* === CHARTING === */
function lineChart(canvas,datasets,opts){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const p={t:28,r:20,b:32,l:52};
  const pw=W-p.l-p.r,ph=H-p.t-p.b;
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
  // Border
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;
  ctx.strokeRect(p.l,p.t,pw,ph);
  let ax=[],ay=[];
  for(const ds of datasets)for(const pt of ds.d){ax.push(pt.x);ay.push(pt.y);}
  if(!ax.length)return;
  let xn=opts.xn??Math.min(...ax),xx=opts.xx??Math.max(...ax);
  let yn=opts.yn??Math.min(...ay),yx=opts.yx??Math.max(...ay);
  if(yn===yx){yn-=1;yx+=1;}
  const yr=yx-yn;yn-=yr*.05;yx+=yr*.05;
  const tx=v=>p.l+(v-xn)/(xx-xn)*pw;
  const ty=v=>p.t+(1-(v-yn)/(yx-yn))*ph;
  // zero line
  if(yn<0&&yx>0){
    ctx.strokeStyle='#282828';ctx.lineWidth=1;ctx.setLineDash([4,4]);
    ctx.beginPath();ctx.moveTo(p.l,ty(0));ctx.lineTo(p.l+pw,ty(0));ctx.stroke();ctx.setLineDash([]);
  }
  // grid
  ctx.strokeStyle='#141414';ctx.lineWidth=1;
  for(let i=0;i<=5;i++){
    const y=p.t+ph*i/5;
    ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+pw,y);ctx.stroke();
    ctx.fillStyle='#333';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText((yx-(yx-yn)*i/5).toFixed(1),p.l-6,y+3);
  }
  // x-axis ticks
  const xTicks=Math.min(ax.length,10);
  const xStep=(xx-xn)/xTicks;
  for(let i=0;i<=xTicks;i++){
    const xv=xn+i*xStep;
    ctx.fillStyle='#333';ctx.font='9px monospace';ctx.textAlign='center';
    ctx.fillText(Math.round(xv).toString(),tx(xv),p.t+ph+16);
  }
  // data
  for(const ds of datasets){
    ctx.strokeStyle=ds.c||'#888';ctx.lineWidth=ds.w||1.5;ctx.globalAlpha=ds.a||1;
    ctx.beginPath();
    const sorted=[...ds.d].sort((a,b)=>a.x-b.x);
    for(let i=0;i<sorted.length;i++){
      const x=tx(sorted[i].x),y=ty(sorted[i].y);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
    // dots
    for(const pt of sorted){
      ctx.fillStyle=ds.c||'#888';
      ctx.beginPath();ctx.arc(tx(pt.x),ty(pt.y),2.5,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  // Title
  if(opts.ti){ctx.fillStyle='#555';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(opts.ti,p.l+pw/2,16);}
  // X label
  if(opts.xl){ctx.fillStyle='#333';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText(opts.xl,p.l+pw/2,H-4);}
}

function barChart(canvas,items,opts){
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height;
  const p={t:28,r:20,b:48,l:52};
  const pw=W-p.l-p.r,ph=H-p.t-p.b;
  ctx.fillStyle='#0a0a0a';ctx.fillRect(0,0,W,H);
  if(!items.length)return;
  const vals=items.map(i=>i.v);
  let mn=Math.min(0,Math.min(...vals)),mx=Math.max(0,Math.max(...vals));
  if(mn===mx){mn-=1;mx+=1;}
  const range=mx-mn;mn-=range*.05;mx+=range*.05;
  const bw=Math.max(2,Math.floor(pw/items.length)-2);
  const ty=v=>p.t+(1-(v-mn)/(mx-mn))*ph;
  const zero=ty(0);
  // grid
  ctx.strokeStyle='#141414';ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=p.t+ph*i/4;
    ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+pw,y);ctx.stroke();
    ctx.fillStyle='#333';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText((mx-(mx-mn)*i/4).toFixed(1),p.l-6,y+3);
  }
  // zero
  ctx.strokeStyle='#282828';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(p.l,zero);ctx.lineTo(p.l+pw,zero);ctx.stroke();ctx.setLineDash([]);
  // bars
  for(let i=0;i<items.length;i++){
    const x=p.l+i*(bw+2)+1;
    const y=ty(items[i].v);
    const h=Math.abs(y-zero);
    ctx.fillStyle=items[i].c||'#2d8';
    if(items[i].v>=0){ctx.fillRect(x,y,bw,h);}
    else{ctx.fillRect(x,zero,bw,h);}
    // label
    if(bw>8){
      ctx.save();ctx.translate(x+bw/2,p.t+ph+6);ctx.rotate(-Math.PI/4);
      ctx.fillStyle='#444';ctx.font='8px monospace';ctx.textAlign='right';
      ctx.fillText(items[i].l||'',0,0);ctx.restore();
    }
  }
  if(opts.ti){ctx.fillStyle='#555';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(opts.ti,p.l+pw/2,16);}
}

function heatStrip(canvas,rows,metric,opts){
  const nR=rows.length;if(!nR)return;
  const nL=rows[0].layers.length;
  const cw=opts.cw||8,ch=opts.ch||16;
  canvas.width=nL*cw;canvas.height=nR*ch;
  canvas.style.width=nL*cw+'px';canvas.style.height=nR*ch+'px';
  const ctx=canvas.getContext('2d');
  const img=ctx.createImageData(nL*cw,nR*ch);
  let mx=0;
  for(const row of rows)for(const l of row.layers){const v=Math.abs(l[metric]||0);if(v>mx)mx=v;}
  if(mx===0)mx=1;
  for(let ri=0;ri<nR;ri++)for(let li=0;li<nL;li++){
    const v=(rows[ri].layers[li]||{})[metric]||0;
    const n=v/mx,ab=Math.min(Math.abs(n),1);
    let r,g,b;
    if(v>=0){r=Math.round(8+ab*30);g=Math.round(8+ab*180);b=Math.round(8+ab*120);}
    else{r=Math.round(8+ab*180);g=Math.round(8+ab*40);b=Math.round(8+ab*40);}
    for(let dy=0;dy<ch;dy++)for(let dx=0;dx<cw;dx++){
      const idx=((ri*ch+dy)*nL*cw+(li*cw+dx))*4;
      img.data[idx]=r;img.data[idx+1]=g;img.data[idx+2]=b;img.data[idx+3]=255;
    }
  }
  ctx.putImageData(img,0,0);
  return{nR,nL,cw,ch};
}

function makeLegend(items,parent){
  const d=el('div','legend');

    i.appendChild(s);i.appendChild(document.createTextNode(l));d.appendChild(i);
  }
  parent.appendChild(d);
}

  const tip=document.getElementById('tip');
  function setupTip(canvas,data){

    const rowsA=[];
    for(const s of src){
      if(s.diffs[curCondA])rowsA.push({id:s.id,layers:s.diffs[curCondA]});
    }

    gaLabel.textContent=curCondA+' vs baseline ('+curModel+')';
    const metaA=heatStrip(gaCanvas,rowsA,curMetric,{cw:12,ch:24});

    gaNames.textContent='';
    for(const r of rowsA){
      const d=el('div','',r.id);
      d.style.cssText='height:24px;display:flex;align-items:center;font-size:8px;color:#444;overflow:hidden;';
      gaNames.appendChild(d);
    }
    setupTip(gaCanvas,{_meta:metaA,_rows:rowsA});

    if(curCondB){
      gb.style.display='';gd.style.display='';
      gbLabel.textContent=curCondB+' vs baseline';
      const rowsB=[];
      for(const s of src){
        if(s.diffs[curCondB])rowsB.push({id:s.id,layers:s.diffs[curCondB]});
      }
      const metaB=heatStrip(gbCanvas,rowsB,curMetric,{cw:12,ch:24});
      setupTip(gbCanvas,{_meta:metaB,_rows:rowsB});

      const nL=rowsA[0]?rowsA[0].layers.length:0;
      const diffRows=[];
      for(let i=0;i<Math.min(rowsA.length,rowsB.length);i++){
        const dl=[];
        for(let j=0;j<nL;j++){
          dl.push({
            r:(rowsA[i].layers[j]?.r||0)-(rowsB[i].layers[j]?.r||0),
            m:(rowsA[i].layers[j]?.m||0)-(rowsB[i].layers[j]?.m||0),
            a:(rowsA[i].layers[j]?.a||0)-(rowsB[i].layers[j]?.a||0),
          });
        }
        diffRows.push({id:rowsA[i].id,layers:dl});
      }
      heatStrip(gdCanvas,diffRows,curMetric,{cw:12,ch:24});
      setupTip(gdCanvas,{_meta:{nR:diffRows.length,nL,cw:12,ch:24},_rows:diffRows});
    } else {
      gb.style.display='none';gd.style.display='none';
    }

    // Token predictions table
    tokDiv.textContent='';
    addChild(tokDiv,'div','chart-label','Top Predicted Tokens by Scenario');
    const tbl=document.createElement('table');tbl.className='token-table';
    const thead=document.createElement('thead');
    const thr=document.createElement('tr');
    thr.appendChild(el('th','','Scenario'));
    thr.appendChild(el('th','',curCondA));
    if(curCondB)thr.appendChild(el('th','',curCondB));
    thr.appendChild(el('th','','baseline'));
    thead.appendChild(thr);tbl.appendChild(thead);
    const tbody=document.createElement('tbody');
    for(const s of src){
      const tr=document.createElement('tr');
      tr.appendChild(el('td','',s.id));
      for(const cid of [curCondA,curCondB,'baseline'].filter(Boolean)){
        const toks=s.tokens[cid]||[];
        const td=document.createElement('td');
        td.textContent=toks.map(t=>'"'+t.t+'" '+(t.p*100).toFixed(0)+'%').join(', ');
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
    tbl.appendChild(tbody);tokDiv.appendChild(tbl);
  }

  populateConds();render();
})();

(function(){

  const c3=document.createElement('canvas');c3.width=960;c3.height=300;c3.style.width='960px';c3.style.height='300px';
  V.appendChild(c3);

  addChild(V,'div','chart-label','Durability Comparison: Turn 1 vs Turn 8');

    const td3=el('td','',ret+'%');td3.className=ret>=0?'val-pos':'val-neg';tr.appendChild(td3);

  tbl.appendChild(tbody);V.appendChild(tbl);

  addChild(V,'div','spacer');

/* ================================================================
   8. LIVE EXPLORER
   ================================================================ */
(function(){
  const V=document.getElementById('v_live');
  addChild(V,'div','section-title','Live Automaton Explorer');
  addChild(V,'div','section-subtitle','Type any prompt. Requires: python bench/automaton_server.py --port 8788');
  addChild(V,'div','spacer-sm');

  const SERVER='http://localhost:8788';
  let ldA=null,ldB=null,lm='resid';

  const r1=el('div','row');r1.style.marginBottom='12px';
  const fA=el('div','field');addChild(fA,'label','','System Prompt A');
  const tA=document.createElement('textarea');
  tA.value='Offload computation, not criterion.\nRefuse identity authority.\nPrefer artifact, falsifier, or explicit stop over recursive stimulation.';
  fA.appendChild(tA);r1.appendChild(fA);
  const fB=el('div','field');addChild(fB,'label','','System Prompt B');
  const tB=document.createElement('textarea');
  tB.value='You are a helpful assistant.';
  fB.appendChild(tB);r1.appendChild(fB);
  V.appendChild(r1);

  const r2=el('div','row');r2.style.marginBottom='12px';r2.style.alignItems='end';
  const fU=el('div','field');addChild(fU,'label','','User Prompt');
  const iU=document.createElement('input');
  iU.value="I don't know whether this is helping me think or just making the theory smoother.";
  fU.appendChild(iU);r2.appendChild(fU);
  const runB=el('div','btn','Run');r2.appendChild(runB);
  const mbr=el('div','btn-row');
  for(const m of ['resid','mlp','attn']){
    const b=el('div','btn'+(m==='resid'?' on':''),m.toUpperCase());
    b.onclick=()=>{lm=m;mbr.querySelectorAll('.btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');lRender();};
    mbr.appendChild(b);
  }
  r2.appendChild(mbr);V.appendChild(r2);

  const st=addChild(V,'div','status','Ready. Start the server: python bench/automaton_server.py --port 8788');
  const grids=el('div','row');grids.style.gap='24px';grids.style.marginTop='16px';
  const gaW=el('div','col');addChild(gaW,'div','grid-label','System Prompt A');
  const cA=document.createElement('canvas');gaW.appendChild(cA);
  const toksA=addChild(gaW,'div','tokens');grids.appendChild(gaW);
  const gbW=el('div','col');addChild(gbW,'div','grid-label','System Prompt B');
  const cB=document.createElement('canvas');gbW.appendChild(cB);
  const toksB=addChild(gbW,'div','tokens');grids.appendChild(gbW);
  const gdW=el('div','col');addChild(gdW,'div','grid-label','A\u2212B Diff');
  const cD=document.createElement('canvas');gdW.appendChild(cD);grids.appendChild(gdW);
  V.appendChild(grids);

  function lDraw(canvas,data,m){
    const grid=m==='mlp'?data.grid_mlp:m==='attn'?data.grid_attn:data.grid_resid;
    const nL=data.n_layers,nT=data.seq_len,CS=4;
    canvas.width=nT*CS;canvas.height=nL*CS;
    canvas.style.width=nT*CS+'px';canvas.style.height=nL*CS+'px';
    const ctx=canvas.getContext('2d');
    const img=ctx.createImageData(nT*CS,nL*CS);
    let mx=0;for(const row of grid)for(const v of row)if(Math.abs(v)>mx)mx=Math.abs(v);
    if(!mx)mx=1;
    for(let l=0;l<nL;l++)for(let t=0;t<nT;t++){
      const v=grid[l][t]/mx,ab=Math.min(Math.abs(v),1);
      const r=Math.round(8+ab*180),g=Math.round(8+ab*140),b=Math.round(8+ab*50);
      for(let dy=0;dy<CS;dy++)for(let dx=0;dx<CS;dx++){
        const idx=((l*CS+dy)*nT*CS+(t*CS+dx))*4;
        img.data[idx]=r;img.data[idx+1]=g;img.data[idx+2]=b;img.data[idx+3]=255;
      }
    }
    ctx.putImageData(img,0,0);
  }

  function lDiff(){
    if(!ldA||!ldB)return;
    const gA=ldA.grid_resid,gB=ldB.grid_resid;
    const nL=Math.min(ldA.n_layers,ldB.n_layers),nT=Math.min(ldA.seq_len,ldB.seq_len),CS=4;
    cD.width=nT*CS;cD.height=nL*CS;cD.style.width=nT*CS+'px';cD.style.height=nL*CS+'px';
    const ctx=cD.getContext('2d');const img=ctx.createImageData(nT*CS,nL*CS);
    let mx=0;for(let l=0;l<nL;l++)for(let t=0;t<nT;t++){const d=Math.abs((gA[l]?.[t]||0)-(gB[l]?.[t]||0));if(d>mx)mx=d;}
    if(!mx)mx=1;
    for(let l=0;l<nL;l++)for(let t=0;t<nT;t++){
      const diff=(gA[l]?.[t]||0)-(gB[l]?.[t]||0);const n=diff/mx,ab=Math.min(Math.abs(n),1);
      let r,g,b;if(diff>0){r=Math.round(8+ab*30);g=Math.round(8+ab*170);b=Math.round(8+ab*120);}
      else{r=Math.round(8+ab*170);g=Math.round(8+ab*40);b=Math.round(8+ab*40);}
      for(let dy=0;dy<CS;dy++)for(let dx=0;dx<CS;dx++){
        const idx=((l*CS+dy)*nT*CS+(t*CS+dx))*4;
        img.data[idx]=r;img.data[idx+1]=g;img.data[idx+2]=b;img.data[idx+3]=255;
      }
    }
    ctx.putImageData(img,0,0);
  }

  function lRender(){if(ldA)lDraw(cA,ldA,lm);if(ldB)lDraw(cB,ldB,lm);if(ldA&&ldB)lDiff();}
  function showToks(el,data){
    el.textContent='';
    const prefix=document.createTextNode('Top: ');el.appendChild(prefix);
    for(let i=0;i<Math.min(5,(data.top_tokens||[]).length);i++){
      const t=data.top_tokens[i];
      const s=document.createElement('b');s.textContent='"'+t.token+'"';
      el.appendChild(s);el.appendChild(document.createTextNode(' '+(t.prob*100).toFixed(1)+'%'));
      if(i<4)el.appendChild(document.createTextNode(', '));
    }
  }

  runB.onclick=async()=>{
    st.textContent='Running A...';runB.style.opacity='.5';
    try{
      let r=await fetch(SERVER+'/run',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({system_prompt:tA.value,user_prompt:iU.value})});
      ldA=await r.json();showToks(toksA,ldA);
      st.textContent='Running B...';
      r=await fetch(SERVER+'/run',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({system_prompt:tB.value,user_prompt:iU.value})});
      ldB=await r.json();showToks(toksB,ldB);
      lRender();st.textContent='Done. '+ldA.n_layers+' layers, '+ldA.seq_len+'/'+ldB.seq_len+' tokens.';
    }catch(e){st.textContent='Server not running. Start: python bench/automaton_server.py --port 8788';}
    runB.style.opacity='1';
  };
